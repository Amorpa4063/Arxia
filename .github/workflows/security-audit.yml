name: Security Audit

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1"  # Weekly on Monday

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          RUSTUP_TOOLCHAIN: stable
